<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050b13" />
    <meta name="description" content="Interactive React canvas simulation of AlN ceramic resistivity, leakage, grain-boundary conduction, fluorine damage, breakdown, and residual charge." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Ceramic Electrical Reliability Simulator</title>
    <style>
      html, body, #root { margin: 0; min-height: 100%; width: 100%; overflow-x: hidden; background: #050b13; }
      * { box-sizing: border-box; }
      body { -webkit-text-size-adjust: 100%; }
      button, input, select { font: inherit; touch-action: manipulation; }
      canvas { display: block; max-width: 100%; touch-action: manipulation; }
      code { color: #eaf6ff; overflow-wrap: anywhere; }
      @media (max-width: 430px) {
        button { padding-left: 7px !important; padding-right: 7px !important; font-size: 12px !important; }
      }
    </style>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  </head>
  <body>
    <div id="root" style="min-height:100vh;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#eaf6ff">Loading ceramic simulator…</div>
    <noscript>This simulator requires JavaScript.</noscript>
    <script src="./app.js"></script>
  </body>
</html>
